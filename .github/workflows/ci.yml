name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install html5validator
        run: pip install html5validator
      - name: Validate HTML
        run: html5validator --root .
      - name: Success
        run: echo "Build and HTML validation passed!"
